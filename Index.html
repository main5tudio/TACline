<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TACLINE — Step 2: Movement</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;overflow:hidden;font-family:'Share Tech Mono',monospace;touch-action:none;user-select:none;}
canvas{display:block;position:fixed;inset:0;}

/* ── HUD TOP ── */
#hud{position:fixed;top:0;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(8,6,2,.9);border-bottom:1px solid rgba(180,140,80,.15);z-index:30;pointer-events:none;}
.hteam{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;padding:1px 10px;}
.hteam.red{background:#7a1515;color:#ffcccc;}
.hteam.blue{background:#152a45;color:#ccdeff;}
#pushbar{position:fixed;top:40px;left:0;right:0;height:16px;background:rgba(8,6,2,.7);border-bottom:1px solid rgba(180,140,80,.1);z-index:30;pointer-events:none;display:flex;align-items:center;justify-content:center;gap:8px;}
#pushtrack{width:200px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;position:relative;}
#pushfill{position:absolute;height:100%;border-radius:3px;transition:all .5s;left:50%;width:0%;}
#pushlbl{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;}

/* ── MINIMAP ── */
#mmwrap{position:fixed;right:10px;top:62px;z-index:30;}
#mm{display:block;border:1px solid rgba(180,140,80,.25);border-radius:2px;}
#mmlbl{font-size:8px;color:rgba(255,255,255,.2);text-align:center;margin-top:2px;letter-spacing:1px;}

/* ── ZONE PANEL ── */
#zpanel{position:fixed;left:10px;top:62px;width:148px;background:rgba(8,6,2,.85);border:1px solid rgba(180,140,80,.18);border-radius:2px;padding:7px 9px;z-index:30;pointer-events:none;}
#zpanel .zt{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:rgba(180,140,80,.75);letter-spacing:2px;margin-bottom:5px;}
.zrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;font-size:9px;color:rgba(255,255,255,.4);}
.zst{padding:1px 5px;border-radius:2px;font-size:8px;font-weight:bold;}
.zst.neutral{background:rgba(180,140,80,.18);color:rgba(180,140,80,.7);}
.zst.red{background:rgba(122,21,21,.55);color:#ffaaaa;}
.zst.blue{background:rgba(21,42,69,.55);color:#aaceff;}
.zst.capping{background:rgba(230,126,34,.28);color:#ffb86c;animation:cblink .5s infinite;}
@keyframes cblink{0%,100%{opacity:1;}50%{opacity:.3;}}
.zcbar{width:100%;height:2px;background:rgba(255,255,255,.07);border-radius:2px;margin:1px 0 3px;}
.zcfill{height:100%;border-radius:2px;transition:width .3s;}

/* ── JOYSTICK ── */
#joyarea{position:fixed;left:18px;bottom:80px;z-index:30;touch-action:none;}
#joyouter{width:100px;height:100px;border-radius:50%;border:2px dashed rgba(255,255,255,.12);background:rgba(255,255,255,.03);position:relative;display:flex;align-items:center;justify-content:center;}
#joyinner{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.32);position:absolute;pointer-events:none;}

/* ── STANCE BUTTON ── */
#stancebtn{position:fixed;left:18px;bottom:30px;z-index:30;background:rgba(8,6,2,.85);border:1.5px solid rgba(180,140,80,.35);color:rgba(180,140,80,.8);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:6px 14px;border-radius:2px;cursor:pointer;}
#stancebtn:active{background:rgba(180,140,80,.2);}

/* ── HEALTH BAR ── */
#hpwrap{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:130px;z-index:30;pointer-events:none;}
#hpbar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;}
#hpfill{height:100%;width:100%;background:#27ae60;border-radius:3px;transition:width .3s,background .3s;}
#hplbl{font-size:8px;color:rgba(255,255,255,.3);text-align:center;margin-top:2px;letter-spacing:1px;}

/* ── AMMO ── */
#ammohud{position:fixed;right:80px;bottom:20px;z-index:30;pointer-events:none;text-align:right;}
#ammohud span{font-size:20px;font-family:'Rajdhani',sans-serif;font-weight:700;color:rgba(255,200,100,.8);}
#ammohud small{font-size:10px;color:rgba(255,255,255,.3);display:block;letter-spacing:1px;}

/* ── HIT FLASH ── */
#hitflash{position:fixed;inset:0;pointer-events:none;z-index:50;background:rgba(192,57,43,0);transition:background .08s;}

/* ── DEBUG PANEL ── */
#dbgbtn{position:fixed;right:10px;bottom:10px;z-index:40;background:rgba(20,20,30,.9);border:1.5px solid rgba(100,200,255,.3);color:rgba(100,200,255,.7);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:5px 10px;border-radius:2px;cursor:pointer;}
#dbgbtn:active{background:rgba(100,200,255,.15);}
#dbgpanel{
  position:fixed;right:10px;bottom:46px;z-index:40;
  width:240px;
  background:rgba(10,12,20,.95);
  border:1.5px solid rgba(100,200,255,.25);
  border-radius:3px;padding:10px 12px;
  display:none;
  max-height:70vh;overflow-y:auto;
}
#dbgpanel.open{display:block;}
#dbgpanel h3{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:rgba(100,200,255,.7);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;}
.dbgrow{margin-bottom:8px;}
.dbgrow label{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:1px;display:flex;justify-content:space-between;margin-bottom:3px;}
.dbgrow label span{color:rgba(100,200,255,.8);font-weight:bold;}
.dbgrow input[type=range]{width:100%;accent-color:#64c8ff;cursor:pointer;height:3px;}
.dbgsep{border:none;border-top:1px solid rgba(255,255,255,.06);margin:8px 0;}
.dbgreset{width:100%;margin-top:6px;background:rgba(100,200,255,.1);border:1px solid rgba(100,200,255,.25);color:rgba(100,200,255,.6);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:4px;border-radius:2px;cursor:pointer;}
.dbgreset:active{background:rgba(100,200,255,.25);}

/* ── KILL FEED ── */
#kfeed{position:fixed;top:62px;right:80px;z-index:30;pointer-events:none;display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
.kf{font-size:9px;padding:2px 7px;border-radius:2px;animation:kfout 2.5s forwards;}
.kf.red{background:rgba(122,21,21,.7);color:#ffaaaa;}
.kf.blue{background:rgba(21,42,69,.7);color:#aaceff;}
@keyframes kfout{0%{opacity:1;}75%{opacity:1;}100%{opacity:0;}}

/* ── CROSSHAIR LABEL ── */
#xhairlbl{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:28;font-size:9px;color:rgba(255,80,80,.55);letter-spacing:1px;margin-top:22px;display:none;}
</style>
</head>
<body>

<canvas id="gc"></canvas>
<canvas id="mmcanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hteam red">RED TRAINEE</div>
  <div id="pushlbl2" style="font-size:9px;color:rgba(255,255,255,.28);letter-spacing:2px;">PUSH LINE</div>
  <div class="hteam blue">BLUE TRAINEE</div>
</div>
<div id="pushbar">
  <div id="pushtrack"><div id="pushfill"></div></div>
  <div id="pushlbl">NEUTRAL</div>
</div>

<!-- MINIMAP -->
<div id="mmwrap">
  <canvas id="mm" width="62" height="310"></canvas>
  <div id="mmlbl">OVERVIEW</div>
</div>

<!-- ZONE PANEL -->
<div id="zpanel">
  <div class="zt">Zones</div>
  <div id="zrows"></div>
</div>

<!-- JOYSTICK -->
<div id="joyarea">
  <div id="joyouter"><div id="joyinner"></div></div>
</div>

<!-- STANCE -->
<button id="stancebtn" onclick="cycleStance()">▣ STAND</button>

<!-- HEALTH -->
<div id="hpwrap">
  <div id="hpbar"><div id="hpfill"></div></div>
  <div id="hplbl">HP</div>
</div>

<!-- AMMO -->
<div id="ammohud">
  <span id="ammoval">30</span>
  <small>AMMO</small>
</div>

<!-- HIT FLASH -->
<div id="hitflash"></div>

<!-- CROSSHAIR LABEL -->
<div id="xhairlbl">TARGET</div>

<!-- KILL FEED -->
<div id="kfeed"></div>

<!-- DEBUG -->
<button id="dbgbtn" onclick="toggleDbg()">⚙ TUNE</button>
<div id="dbgpanel" id="dbgpanel">
  <h3>⚙ Tune Variables</h3>

  <div class="dbgrow">
    <label>Move Speed <span id="lbl_moveSpeed"></span></label>
    <input type="range" id="sl_moveSpeed" min="0.5" max="6" step="0.1">
  </div>
  <div class="dbgrow">
    <label>Rotate Speed <span id="lbl_rotSpeed"></span></label>
    <input type="range" id="sl_rotSpeed" min="0.005" max="0.12" step="0.001">
  </div>
  <div class="dbgrow">
    <label>Crouch Speed Mult <span id="lbl_crouchMult"></span></label>
    <input type="range" id="sl_crouchMult" min="0.2" max="1" step="0.05">
  </div>
  <div class="dbgrow">
    <label>Prone Speed Mult <span id="lbl_proneMult"></span></label>
    <input type="range" id="sl_proneMult" min="0.1" max="0.6" step="0.05">
  </div>

  <hr class="dbgsep">

  <div class="dbgrow">
    <label>Auto-shoot Range (px) <span id="lbl_shootRange"></span></label>
    <input type="range" id="sl_shootRange" min="40" max="300" step="5">
  </div>
  <div class="dbgrow">
    <label>Crosshair Cone (°) <span id="lbl_coneDeg"></span></label>
    <input type="range" id="sl_coneDeg" min="5" max="60" step="1">
  </div>
  <div class="dbgrow">
    <label>Fire Rate (ms) <span id="lbl_fireRate"></span></label>
    <input type="range" id="sl_fireRate" min="50" max="800" step="25">
  </div>
  <div class="dbgrow">
    <label>Bullet Damage <span id="lbl_bulletDmg"></span></label>
    <input type="range" id="sl_bulletDmg" min="5" max="60" step="1">
  </div>
  <div class="dbgrow">
    <label>Bullet Speed <span id="lbl_bulletSpd"></span></label>
    <input type="range" id="sl_bulletSpd" min="3" max="20" step="0.5">
  </div>

  <hr class="dbgsep">

  <div class="dbgrow">
    <label>Camera Zoom <span id="lbl_camZoom"></span></label>
    <input type="range" id="sl_camZoom" min="0.4" max="2.5" step="0.05">
  </div>
  <div class="dbgrow">
    <label>Cam Offset Forward <span id="lbl_camOffset"></span></label>
    <input type="range" id="sl_camOffset" min="0" max="150" step="5">
  </div>

  <hr class="dbgsep">

  <div class="dbgrow">
    <label>Enemy Bot Speed <span id="lbl_botSpeed"></span></label>
    <input type="range" id="sl_botSpeed" min="0.3" max="4" step="0.1">
  </div>
  <div class="dbgrow">
    <label>Enemy Bot HP <span id="lbl_botHP"></span></label>
    <input type="range" id="sl_botHP" min="20" max="300" step="10">
  </div>

  <button class="dbgreset" onclick="resetDefaults()">↺ Reset Defaults</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  TACLINE — STEP 2
//  Tacticool-style world rotation + player + bot
//  + live debug tuning panel
// ═══════════════════════════════════════════════

const gc  = document.getElementById('gc');
const ctx = gc.getContext('2d');
const mmC = document.getElementById('mm');
const mmX = mmC.getContext('2d');

// ── TUNABLE VARIABLES (defaults) ──────────────
const VARS = {
  moveSpeed:   2.8,
  rotSpeed:    0.032,
  crouchMult:  0.55,
  proneMult:   0.28,
  shootRange:  160,
  coneDeg:     22,
  fireRate:    180,   // ms between shots
  bulletDmg:   22,
  bulletSpd:   10,
  camZoom:     1.6,
  camOffset:   60,    // px ahead of player camera looks
  botSpeed:    1.4,
  botHP:       100,
};

// ── MAP CONSTANTS ──────────────────────────────
const MAP_W  = 300;
const MAP_H  = 1500;
const BASE_H = 120;
const PLAY_H = MAP_H - BASE_H*2;
const BAND_H = PLAY_H/6;

// ── COLORS ──────────────────────────────────────
const C = {
  terrain:'#f0e8d0', bandLight:'#ede4c8', bandDark:'#e4dab8',
  baseRed:'#d4c89a', baseBlue:'#c8bea0',
  wallHigh:'#5c4a1e', wallHighBorder:'#c8a84b',
  wallLow:'#8a7a5a',  wallLowBorder:'#b8a870',
  sandbag:'#b8a060',  sandbagBorder:'#8a7040',
  tree:'#4a7a30', treeDark:'#3a6020', treeTrunk:'#5a3e1c',
  grass:'rgba(100,130,60,.18)',
  centerLine:'#7a6030', bandLine:'#c8b890',
};

// ── ZONE DEFS ──────────────────────────────────
const ZONE_DEFS = [
  {id:0,name:'BLUE III', side:'blue',  bandY:BASE_H},
  {id:1,name:'BLUE II',  side:'blue',  bandY:BASE_H+BAND_H},
  {id:2,name:'BLUE I',   side:'blue',  bandY:BASE_H+BAND_H*2},
  {id:3,name:'RED I',    side:'red',   bandY:BASE_H+BAND_H*3},
  {id:4,name:'RED II',   side:'red',   bandY:BASE_H+BAND_H*4},
  {id:5,name:'RED III',  side:'red',   bandY:BASE_H+BAND_H*5},
];
ZONE_DEFS.forEach((z,i)=>{
  z.cx = MAP_W*(0.35+(i%2)*0.3);
  z.cy = z.bandY+BAND_H*0.5;
  z.r  = 36;
  z.ctrl='neutral'; z.capPct=0; z.capper=null; z.capTimer=0;
});

// ── OBSTACLES ─────────────────────────────────
const obstacles=[];
function addWH(x,y,w,h){obstacles.push({t:'wall_high',x,y,w,h});}
function addWL(x,y,w,h){obstacles.push({t:'wall_low',x,y,w,h});}
function addSB(x,y,w,h){obstacles.push({t:'sandbag',x,y,w,h});}
function addTR(x,y,r)  {obstacles.push({t:'tree',x,y,r});}

(function buildMap(){
  ZONE_DEFS.forEach((z,i)=>{
    const cx=z.cx,cy=z.cy;
    // each zone slightly different layout
    if(i===0||i===5){
      addWH(cx-70,cy-50,50,10); addWH(cx+30,cy-40,10,50);
      addWL(cx-50,cy+30,40,8);  addWL(cx+40,cy+20,35,8);
      addSB(cx-20,cy-45,35,12); addTR(cx-80,cy-20,12); addTR(cx+70,cy+30,11);
    } else if(i===1||i===4){
      addWH(cx-55,cy-55,10,55); addWH(cx+50,cy-20,50,10);
      addWL(cx-30,cy+35,50,8);  addSB(cx+20,cy-50,30,12);
      addSB(cx-50,cy+10,12,30); addTR(cx+80,cy-40,13); addTR(cx-75,cy+45,11);
    } else {
      addWH(cx-80,cy-30,60,10); addWH(cx+30,cy-30,60,10);
      addWH(cx-10,cy+30,10,45); addWL(cx-80,cy+40,35,8);
      addSB(cx-40,cy-50,30,12); addSB(cx+15,cy-50,30,12);
      addTR(cx-85,cy-50,12);    addTR(cx+85,cy-20,11);
    }
  });
  const cy0=BASE_H+BAND_H*3;
  addWH(20,cy0-8,60,10); addWH(MAP_W-80,cy0-8,60,10);
  addSB(MAP_W/2-40,cy0-14,30,10); addSB(MAP_W/2+10,cy0-14,30,10);
  addTR(15,cy0+30,13); addTR(MAP_W-18,cy0-30,12);
  // Edge trees
  for(let y=BASE_H;y<MAP_H-BASE_H;y+=95){
    addTR(8+Math.random()*14,y,9+Math.random()*5);
    addTR(MAP_W-10-Math.random()*14,y,9+Math.random()*5);
  }
})();

// ── SOLID COLLISION ───────────────────────────
function solidAt(x,y,r){
  for(const o of obstacles){
    if(o.t==='wall_high'||o.t==='wall_low'){
      if(x+r>o.x&&x-r<o.x+o.w&&y+r>o.y&&y-r<o.y+o.h) return true;
    }
    if(o.t==='tree'&&Math.hypot(x-o.x,y-o.y)<o.r+r-4) return true;
  }
  return false;
}

// ── WORLD STATE ───────────────────────────────
let worldAngle = 0;  // radians — rotation of world around player

// ── PLAYER ────────────────────────────────────
const STANCES = ['STAND','CROUCH','PRONE'];
let stanceIdx = 0;
const player = {
  x: MAP_W/2, y: MAP_H - BASE_H - 30,
  angle: -Math.PI/2,   // facing "up" = toward enemy
  hp: 100, maxHp: 100,
  ammo: 30, maxAmmo: 30,
  alive: true,
  team: 'red',
};

// ── ENEMY BOTS ────────────────────────────────
// Start with 3 bots scattered in blue territory
let bots = [];
function spawnBots(){
  bots = [];
  const positions = [
    {x:MAP_W*0.3, y:BASE_H+BAND_H*1.5},
    {x:MAP_W*0.7, y:BASE_H+BAND_H*0.5},
    {x:MAP_W*0.5, y:BASE_H+BAND_H*2.2},
  ];
  positions.forEach((p,i)=>{
    bots.push({
      x:p.x, y:p.y,
      angle: Math.PI/2,
      hp: VARS.botHP, maxHp: VARS.botHP,
      alive: true, team:'blue',
      state:'patrol',
      stTimer: Math.random()*120,
      wp: {x:p.x+(Math.random()-.5)*60, y:p.y+(Math.random()-.5)*80},
      shootTimer:0,
    });
  });
}
spawnBots();

// ── BULLETS ───────────────────────────────────
let bullets = [];
let lastFireTime = 0;

function spawnBullet(x,y,angle,team){
  bullets.push({
    x,y,
    vx: Math.cos(angle)*VARS.bulletSpd,
    vy: Math.sin(angle)*VARS.bulletSpd,
    team, life:120,
    trail:[],
  });
}

// ── PARTICLES ─────────────────────────────────
let particles=[];
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:22,color});
  }
}

// ── JOYSTICK ──────────────────────────────────
const joy = {active:false, sx:0,sy:0, dx:0,dy:0, maxR:42};
const joyEl    = document.getElementById('joyarea');
const joyOuter = document.getElementById('joyouter');
const joyInner = document.getElementById('joyinner');

joyEl.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=joyOuter.getBoundingClientRect();
  joy.sx=r.left+r.width/2; joy.sy=r.top+r.height/2;
  joy.active=true; joy.dx=0; joy.dy=0;
},{passive:false});
joyEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!joy.active)return;
  const t=e.touches[0];
  let dx=t.clientX-joy.sx, dy=t.clientY-joy.sy;
  const dist=Math.hypot(dx,dy);
  if(dist>joy.maxR){dx=dx/dist*joy.maxR; dy=dy/dist*joy.maxR;}
  joy.dx=dx/joy.maxR; joy.dy=dy/joy.maxR;
  joyInner.style.transform=`translate(${dx}px,${dy}px)`;
},{passive:false});
joyEl.addEventListener('touchend',e=>{
  joy.active=false; joy.dx=0; joy.dy=0;
  joyInner.style.transform='';
});

// ── KEYBOARD ──────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;
  if(e.code==='KeyC')cycleStance();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// ── RIGHT-SIDE SWIPE (world rotate) ───────────
let swipe={active:false, lastX:0, side:'none'};
gc.addEventListener('touchstart',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    if(t.clientX > window.innerWidth*0.38){
      swipe={active:true, lastX:t.clientX, id:t.identifier};
    }
  });
},{passive:false});
gc.addEventListener('touchmove',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    if(swipe.active && t.identifier===swipe.id){
      const delta = t.clientX - swipe.lastX;
      worldAngle += delta * VARS.rotSpeed;
      swipe.lastX = t.clientX;
    }
  });
},{passive:false});
gc.addEventListener('touchend',e=>{
  Array.from(e.changedTouches).forEach(t=>{
    if(t.identifier===swipe.id) swipe.active=false;
  });
});

// Mouse rotate (right side drag on desktop)
let mouseSwipe={active:false,lastX:0};
gc.addEventListener('mousedown',e=>{
  if(e.clientX>window.innerWidth*0.38){
    mouseSwipe={active:true,lastX:e.clientX};
    e.preventDefault();
  }
});
gc.addEventListener('mousemove',e=>{
  if(!mouseSwipe.active)return;
  const delta=e.clientX-mouseSwipe.lastX;
  worldAngle+=delta*VARS.rotSpeed;
  mouseSwipe.lastX=e.clientX;
});
gc.addEventListener('mouseup',()=>mouseSwipe.active=false);
gc.addEventListener('mouseleave',()=>mouseSwipe.active=false);

// ── STANCE ────────────────────────────────────
function cycleStance(){
  stanceIdx=(stanceIdx+1)%3;
  document.getElementById('stancebtn').textContent=
    ['▣ STAND','⬛ CROUCH','— PRONE'][stanceIdx];
}

// ── CLAMP ─────────────────────────────────────
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(a,b,t){return a+(b-a)*t;}

// ── AUTO-SHOOT CHECK ──────────────────────────
function inCrosshair(target){
  if(!target.alive)return false;
  const dx=target.x-player.x, dy=target.y-player.y;
  const dist=Math.hypot(dx,dy);
  if(dist>VARS.shootRange)return false;
  // Angle of target relative to player facing
  const targetAngle=Math.atan2(dy,dx);
  const diff=Math.abs(((targetAngle-player.angle)+Math.PI*3)%(Math.PI*2)-Math.PI);
  return diff < (VARS.coneDeg*Math.PI/180);
}

// ── PUSH LINE CALC ────────────────────────────
function recalcPush(){
  let r=ZONE_DEFS.filter(z=>z.ctrl==='red').length;
  let b=ZONE_DEFS.filter(z=>z.ctrl==='blue').length;
  const diff=r-b;
  const pf=document.getElementById('pushfill');
  const pl=document.getElementById('pushlbl');
  if(diff>0){
    pf.style.left='50%';pf.style.right='';
    pf.style.width=(diff/3*50)+'%';
    pf.style.background='linear-gradient(90deg,#7a1515,#c0392b)';
    pl.textContent='RED +'+ diff;
  } else if(diff<0){
    pf.style.right='50%';pf.style.left='';
    pf.style.width=(Math.abs(diff)/3*50)+'%';
    pf.style.background='linear-gradient(90deg,#152a45,#2980b9)';
    pl.textContent='BLUE +'+Math.abs(diff);
  } else {
    pf.style.width='0%';pl.textContent='NEUTRAL';
  }
  updateZonePanel();
}

function updateZonePanel(){
  const cont=document.getElementById('zrows');cont.innerHTML='';
  ZONE_DEFS.forEach(z=>{
    const row=document.createElement('div');row.className='zrow';
    const nm=document.createElement('span');nm.textContent=z.name;
    nm.style.fontSize='8px';
    const st=document.createElement('span');st.className='zst '+(z.capper?'capping':z.ctrl);
    st.textContent=z.capper?(Math.ceil((1-z.capPct)*30)+'s'):z.ctrl.toUpperCase();
    row.appendChild(nm);row.appendChild(st);cont.appendChild(row);
  });
}

// ── KILL FEED ─────────────────────────────────
function addKill(team,label){
  const kf=document.getElementById('kfeed');
  const el=document.createElement('div');el.className='kf '+team;
  el.textContent=label;kf.appendChild(el);
  setTimeout(()=>el.remove(),2600);
}

// ── HIT FLASH ─────────────────────────────────
function hitFlash(){
  const el=document.getElementById('hitflash');
  el.style.background='rgba(192,57,43,.35)';
  setTimeout(()=>el.style.background='rgba(192,57,43,0)',80);
}

// ── BOT AI ────────────────────────────────────
function updateBots(dt){
  bots.forEach(bot=>{
    if(!bot.alive)return;
    // Sync hp max when slider changes
    if(bot.maxHp!==VARS.botHP && bot.hp===bot.maxHp){
      bot.maxHp=VARS.botHP; bot.hp=VARS.botHP;
    }
    bot.stTimer=Math.max(0,bot.stTimer-1);

    // State: detect player
    const pdx=player.x-bot.x, pdy=player.y-bot.y;
    const pdist=Math.hypot(pdx,pdy);

    if(pdist<200 && player.alive){
      bot.state='chase';
      bot.angle=Math.atan2(pdy,pdx);
      // Shoot at player
      bot.shootTimer--;
      if(bot.shootTimer<=0){
        spawnBullet(bot.x,bot.y,bot.angle,'blue');
        bot.shootTimer=Math.floor(40+Math.random()*40);
      }
    } else {
      bot.state='patrol';
      if(bot.stTimer<=0){
        bot.wp={
          x:clamp(bot.x+(Math.random()-.5)*100,12,MAP_W-12),
          y:clamp(bot.y+(Math.random()-.5)*120,BASE_H+10,BASE_H+BAND_H*3-10),
        };
        bot.stTimer=90+Math.random()*80;
      }
    }

    // Move toward waypoint
    const twp = bot.state==='chase' ? player : bot.wp;
    if(twp){
      const dx=twp.x-bot.x, dy=twp.y-bot.y, d=Math.hypot(dx,dy);
      if(d>10){
        const spd=VARS.botSpeed;
        const nx=bot.x+dx/d*spd, ny=bot.y+dy/d*spd;
        if(!solidAt(nx,bot.y,9))bot.x=nx;
        else if(!solidAt(bot.x,ny,9))bot.y=ny;
        if(bot.state==='patrol')bot.angle=Math.atan2(dy,dx);
      }
    }
    bot.x=clamp(bot.x,5,MAP_W-5);
    bot.y=clamp(bot.y,BASE_H+5,BASE_H+BAND_H*3-5);
  });
}

// ── UPDATE BULLETS ────────────────────────────
function updateBullets(){
  bullets=bullets.filter(b=>{
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>6)b.trail.shift();
    b.x+=b.vx; b.y+=b.vy; b.life--;

    // Wall collision
    for(const o of obstacles){
      if(o.t==='wall_high'||o.t==='wall_low'){
        if(b.x>o.x&&b.x<o.x+o.w&&b.y>o.y&&b.y<o.y+o.h){
          spawnParticles(b.x,b.y,'#c8a84b',3); return false;
        }
      }
      if(o.t==='tree'&&Math.hypot(b.x-o.x,b.y-o.y)<o.r){
        spawnParticles(b.x,b.y,'#4a7a30',3); return false;
      }
    }

    // Hit player
    if(b.team==='blue'&&player.alive&&Math.hypot(b.x-player.x,b.y-player.y)<12){
      player.hp=Math.max(0,player.hp-VARS.bulletDmg);
      spawnParticles(b.x,b.y,'#e74c3c',5);
      hitFlash();
      if(player.hp<=0){
        player.alive=false;
        addKill('blue','Player KIA');
      }
      return false;
    }

    // Hit bots
    if(b.team==='red'){
      for(const bot of bots){
        if(!bot.alive)continue;
        if(Math.hypot(b.x-bot.x,b.y-bot.y)<12){
          bot.hp-=VARS.bulletDmg;
          spawnParticles(b.x,b.y,'#e74c3c',5);
          if(bot.hp<=0){
            bot.alive=false;
            addKill('red','Bot eliminated');
          }
          return false;
        }
      }
    }

    return b.life>0&&b.x>0&&b.x<MAP_W&&b.y>0&&b.y<MAP_H;
  });
}

// ── UPDATE PARTICLES ──────────────────────────
function updateParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vx*=.84;p.vy*=.84;p.life--;return p.life>0;
  });
}

// ── MAIN UPDATE ───────────────────────────────
let lastT=0;
function update(ts){
  const dt=Math.min(32,ts-lastT); lastT=ts;

  if(player.alive){
    // ── Movement (joystick or WASD) ──
    let mx=joy.dx, my=joy.dy;
    if(keys['KeyW']||keys['ArrowUp'])   my=-1;
    if(keys['KeyS']||keys['ArrowDown']) my= 1;
    if(keys['KeyA']||keys['ArrowLeft']) mx=-1;
    if(keys['KeyD']||keys['ArrowRight'])mx= 1;
    // Keyboard mouse rotate
    if(keys['KeyQ']) worldAngle-=VARS.rotSpeed*3;
    if(keys['KeyE']) worldAngle+=VARS.rotSpeed*3;

    // Speed by stance
    const stMult=[1,VARS.crouchMult,VARS.proneMult][stanceIdx];
    const spd=VARS.moveSpeed*stMult;

    // Movement is in world space: player always "faces up" on screen
    // so forward (my<0) = -worldAngle direction in world
    const cosW=Math.cos(-worldAngle), sinW=Math.sin(-worldAngle);
    // Screen forward = world direction of -worldAngle
    // dx_world = mx*cosW - my*sinW
    // dy_world = mx*sinW + my*cosW
    const wdx=(mx*cosW - my*sinW)*spd;
    const wdy=(mx*sinW + my*cosW)*spd;

    const nx=clamp(player.x+wdx,8,MAP_W-8);
    const ny=clamp(player.y+wdy,8,MAP_H-8);
    if(!solidAt(nx,player.y,10))player.x=nx;
    if(!solidAt(player.x,ny,10))player.y=ny;

    // Player always faces "up" on screen = negative worldAngle in world
    player.angle = -worldAngle - Math.PI/2;

    // ── Auto-shoot ──
    const now=performance.now();
    const targets=[...bots];
    let targetInSight=false;
    for(const t of targets){
      if(inCrosshair(t)){
        targetInSight=true;
        if(now-lastFireTime > VARS.fireRate){
          spawnBullet(player.x,player.y,player.angle,'red');
          player.ammo=Math.max(0,player.ammo-1);
          lastFireTime=now;
        }
        break;
      }
    }
    document.getElementById('xhairlbl').style.display=targetInSight?'block':'none';
  }

  updateBots(dt);
  updateBullets();
  updateParticles();
  updateHUD();

  render();
  requestAnimationFrame(update);
}

// ── HUD UPDATE ────────────────────────────────
function updateHUD(){
  const pct=player.alive ? player.hp/player.maxHp : 0;
  const hpf=document.getElementById('hpfill');
  hpf.style.width=(pct*100)+'%';
  hpf.style.background=pct>.6?'#27ae60':pct>.3?'#f39c12':'#e74c3c';
  document.getElementById('ammoval').textContent=player.ammo;
}

// ── RENDER ────────────────────────────────────
function render(){
  gc.width=window.innerWidth; gc.height=window.innerHeight;
  const W=gc.width, H=gc.height;

  // Camera: player always at screen center (slightly offset forward)
  const screenCX=W*0.5;
  const screenCY=H*0.5 + 20; // tiny lower bias like Tacticool

  // World offset: the forward offset in world direction
  const fwdX=Math.cos(player.angle)*VARS.camOffset;
  const fwdY=Math.sin(player.angle)*VARS.camOffset;
  const camWX=player.x-fwdX;
  const camWY=player.y-fwdY;

  ctx.clearRect(0,0,W,H);

  ctx.save();
  // Translate to screen center
  ctx.translate(screenCX, screenCY);
  // Rotate world
  ctx.rotate(worldAngle);
  // Scale (zoom)
  ctx.scale(VARS.camZoom, VARS.camZoom);
  // Translate so camera world pos is at origin
  ctx.translate(-camWX,-camWY);

  // ── DRAW WORLD ──
  drawTerrain();
  drawZoneBands();
  drawObstacles();
  drawZoneCores();

  // Bots
  bots.forEach(b=>{if(b.alive)drawUnit(b,'blue',false);});

  // Player
  if(player.alive) drawUnit(player,'red',true);

  // Bullets
  drawBullets();

  // Particles
  drawParticles();

  ctx.restore();

  // ── CROSSHAIR (screen space, always center) ──
  drawCrosshair(W,H);

  // ── MINIMAP ──
  drawMinimap();
}

// ── DRAW: TERRAIN ─────────────────────────────
function drawTerrain(){
  ctx.fillStyle=C.terrain; ctx.fillRect(0,0,MAP_W,MAP_H);
  ZONE_DEFS.forEach((z,i)=>{
    ctx.fillStyle=i%2===0?C.bandLight:C.bandDark;
    ctx.fillRect(0,z.bandY,MAP_W,BAND_H);
  });
  // Dirt path
  const g=ctx.createLinearGradient(MAP_W/2-14,0,MAP_W/2+14,0);
  g.addColorStop(0,'transparent');g.addColorStop(.3,'rgba(180,155,100,.16)');
  g.addColorStop(.7,'rgba(180,155,100,.16)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(MAP_W/2-14,BASE_H,28,PLAY_H);
  // Bases
  const eg=ctx.createLinearGradient(0,0,0,BASE_H);
  eg.addColorStop(0,'#b8ae88');eg.addColorStop(1,C.baseBlue);
  ctx.fillStyle=eg; ctx.fillRect(0,0,MAP_W,BASE_H);
  const ag=ctx.createLinearGradient(0,MAP_H-BASE_H,0,MAP_H);
  ag.addColorStop(0,C.baseRed);ag.addColorStop(1,'#c8b888');
  ctx.fillStyle=ag; ctx.fillRect(0,MAP_H-BASE_H,MAP_W,BASE_H);
  ctx.strokeStyle='rgba(100,80,30,.35)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,BASE_H);ctx.lineTo(MAP_W,BASE_H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,MAP_H-BASE_H);ctx.lineTo(MAP_W,MAP_H-BASE_H);ctx.stroke();
  // Base labels
  ctx.font="bold 14px 'Rajdhani',sans-serif";
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(80,50,15,.4)'; ctx.fillText('BLUE BASE',MAP_W/2,BASE_H/2);
  ctx.fillStyle='rgba(80,40,10,.5)'; ctx.fillText('RED BASE',MAP_W/2,MAP_H-BASE_H/2);
}

// ── DRAW: ZONE BANDS ──────────────────────────
function drawZoneBands(){
  ZONE_DEFS.forEach((z,i)=>{
    if(z.ctrl!=='neutral'){
      ctx.fillStyle=z.ctrl==='red'?'rgba(139,26,26,.09)':'rgba(26,58,92,.09)';
      ctx.fillRect(0,z.bandY,MAP_W,BAND_H);
    }
    ctx.strokeStyle=C.bandLine; ctx.lineWidth=1;
    ctx.setLineDash([5,8]);
    ctx.beginPath();ctx.moveTo(0,z.bandY);ctx.lineTo(MAP_W,z.bandY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.font="9px 'Share Tech Mono',monospace";
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillStyle='rgba(100,75,25,.3)';
    ctx.fillText(z.name,5,z.bandY+3);
  });
  // Center line
  const cy=BASE_H+BAND_H*3;
  ctx.strokeStyle=C.centerLine;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(MAP_W,cy);ctx.stroke();
}

// ── DRAW: ZONE CORES ──────────────────────────
function drawZoneCores(){
  ZONE_DEFS.forEach(z=>{
    ctx.beginPath();ctx.arc(z.cx,z.cy,z.r,0,Math.PI*2);
    ctx.fillStyle=z.ctrl==='red'?'rgba(139,26,26,.15)':z.ctrl==='blue'?'rgba(26,58,92,.15)':'rgba(180,140,60,.07)';
    ctx.fill();
    if(z.capPct>0){
      ctx.beginPath();ctx.arc(z.cx,z.cy,z.r,-Math.PI/2,-Math.PI/2+Math.PI*2*z.capPct);
      ctx.strokeStyle=z.ctrl==='red'?'rgba(192,57,43,.6)':'rgba(41,128,185,.6)';
      ctx.lineWidth=3;ctx.stroke();
    }
    ctx.beginPath();ctx.arc(z.cx,z.cy,z.r,0,Math.PI*2);
    ctx.strokeStyle=z.ctrl==='red'?'rgba(139,26,26,.6)':z.ctrl==='blue'?'rgba(26,58,92,.6)':'rgba(138,112,64,.5)';
    ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.arc(z.cx,z.cy,4,0,Math.PI*2);
    ctx.fillStyle=z.ctrl==='red'?'rgba(192,57,43,.7)':z.ctrl==='blue'?'rgba(41,128,185,.7)':'rgba(138,112,64,.45)';
    ctx.fill();
    ctx.font="8px 'Share Tech Mono',monospace";
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=z.ctrl==='red'?'rgba(139,26,26,.75)':z.ctrl==='blue'?'rgba(26,58,92,.75)':'rgba(100,75,25,.5)';
    ctx.fillText('FLAG',z.cx,z.cy-7);
    ctx.fillStyle='rgba(100,75,25,.35)';
    ctx.fillText('30s',z.cx,z.cy+9);
  });
}

// ── DRAW: OBSTACLES ───────────────────────────
function drawObstacles(){
  obstacles.forEach(o=>{
    if(o.t==='wall_high'){
      ctx.fillStyle='rgba(0,0,0,.13)';ctx.fillRect(o.x+2,o.y+o.h,o.w,5);
      ctx.fillStyle=C.wallHigh;ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.strokeStyle=C.wallHighBorder;ctx.lineWidth=1.5;ctx.strokeRect(o.x,o.y,o.w,o.h);
      ctx.strokeStyle='rgba(200,170,80,.18)';ctx.lineWidth=.5;
      if(o.w>o.h){
        for(let x=o.x+12;x<o.x+o.w-4;x+=12){ctx.beginPath();ctx.moveTo(x,o.y+1);ctx.lineTo(x,o.y+o.h-1);ctx.stroke();}
        ctx.beginPath();ctx.moveTo(o.x,o.y+o.h/2);ctx.lineTo(o.x+o.w,o.y+o.h/2);ctx.stroke();
      } else {
        for(let y=o.y+10;y<o.y+o.h-4;y+=10){ctx.beginPath();ctx.moveTo(o.x+1,y);ctx.lineTo(o.x+o.w-1,y);ctx.stroke();}
      }
    }
    if(o.t==='wall_low'){
      ctx.fillStyle='rgba(0,0,0,.09)';ctx.fillRect(o.x+2,o.y+o.h,o.w,3);
      ctx.fillStyle=C.wallLow;ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.strokeStyle=C.wallLowBorder;ctx.lineWidth=1;ctx.strokeRect(o.x,o.y,o.w,o.h);
    }
    if(o.t==='sandbag'){
      ctx.fillStyle='rgba(0,0,0,.1)';ctx.fillRect(o.x+2,o.y+o.h,o.w,3);
      ctx.fillStyle=C.sandbag;ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.strokeStyle=C.sandbagBorder;ctx.lineWidth=1.5;ctx.strokeRect(o.x,o.y,o.w,o.h);
      const bw=Math.min(o.w/3,14);
      for(let i=0;i<3;i++){
        ctx.fillStyle='rgba(190,165,90,.45)';
        ctx.beginPath();ctx.ellipse(o.x+bw*(i+.5),o.y+o.h/2,bw*.42,o.h*.42,0,0,Math.PI*2);ctx.fill();
      }
    }
    if(o.t==='tree'){
      ctx.fillStyle='rgba(0,0,0,.13)';ctx.beginPath();ctx.ellipse(o.x+3,o.y+4,o.r,o.r*.65,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=C.treeTrunk;ctx.beginPath();ctx.arc(o.x,o.y,3.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=C.treeDark;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=C.tree;ctx.beginPath();ctx.arc(o.x-1,o.y-1,o.r*.78,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(140,200,80,.15)';ctx.beginPath();ctx.arc(o.x-3,o.y-3,o.r*.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(60,100,30,.35)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.stroke();
    }
  });
}

// ── DRAW: UNIT ────────────────────────────────
function drawUnit(u,team,isPlayer){
  const stance=isPlayer?stanceIdx:0;
  const r=stance===2?6:stance===1?9:11;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath();ctx.ellipse(u.x+2,u.y+3,r+2,r*.7,0,0,Math.PI*2);ctx.fill();

  // Body
  ctx.beginPath();ctx.arc(u.x,u.y,r,0,Math.PI*2);
  ctx.fillStyle=team==='red'?(isPlayer?'#b01818':'#8a1010'):'#1a3a5c';
  ctx.fill();
  ctx.strokeStyle=team==='red'?'#e05050':'#4a8ac8';
  ctx.lineWidth=isPlayer?2:1.5;ctx.stroke();

  // Gun barrel
  const gx=u.x+Math.cos(u.angle)*15, gy=u.y+Math.sin(u.angle)*15;
  ctx.strokeStyle=team==='red'?'#ff7070':'#70a8e0';
  ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(u.x,u.y);ctx.lineTo(gx,gy);ctx.stroke();

  // HP bar (bots only)
  if(!isPlayer){
    const bw=22,bh=3,p=Math.max(0,u.hp/u.maxHp);
    ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(u.x-bw/2,u.y-r-7,bw,bh);
    ctx.fillStyle=p>.5?'#27ae60':p>.25?'#f39c12':'#e74c3c';
    ctx.fillRect(u.x-bw/2,u.y-r-7,bw*p,bh);
  }

  // Player indicator ring
  if(isPlayer){
    ctx.strokeStyle='rgba(255,210,60,.5)';ctx.lineWidth=1;
    ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.arc(u.x,u.y,r+5,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ── DRAW: BULLETS ─────────────────────────────
function drawBullets(){
  bullets.forEach(b=>{
    if(b.trail.length>1){
      ctx.strokeStyle=b.team==='red'?'rgba(231,76,60,.4)':'rgba(100,160,220,.4)';
      ctx.lineWidth=1;ctx.beginPath();
      ctx.moveTo(b.trail[0].x,b.trail[0].y);
      b.trail.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();
    }
    ctx.fillStyle=b.team==='red'?'#ff8060':'#80b8f0';
    ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,Math.PI*2);ctx.fill();
  });
}

// ── DRAW: PARTICLES ───────────────────────────
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/22;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;
}

// ── DRAW: CROSSHAIR ───────────────────────────
function drawCrosshair(W,H){
  const cx=W*.5, cy=H*.5+20;
  const coneR = VARS.shootRange * VARS.camZoom;
  const halfCone = VARS.coneDeg*Math.PI/180;

  // Cone (faint)
  ctx.save();
  ctx.translate(cx,cy);
  // player faces "up" on screen = angle -PI/2 in screen
  const screenFacing = -Math.PI/2;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.arc(0,0,coneR,screenFacing-halfCone,screenFacing+halfCone);
  ctx.closePath();
  ctx.fillStyle='rgba(255,200,60,.04)';ctx.fill();
  ctx.strokeStyle='rgba(255,200,60,.18)';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();

  // Cross dot
  ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-8,cy);ctx.lineTo(cx-3,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+3,cy);ctx.lineTo(cx+8,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-8);ctx.lineTo(cx,cy-3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy+3);ctx.lineTo(cx,cy+8);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.beginPath();ctx.arc(cx,cy,2,0,Math.PI*2);ctx.fill();

  // Dot goes red when enemy in cone
  const anyInCone=bots.some(b=>inCrosshair(b));
  if(anyInCone){
    ctx.fillStyle='rgba(255,60,60,.85)';
    ctx.beginPath();ctx.arc(cx,cy,3.5,0,Math.PI*2);ctx.fill();
  }
}

// ── DRAW: MINIMAP ─────────────────────────────
function drawMinimap(){
  const mW=62,mH=310;
  mmX.clearRect(0,0,mW,mH);
  mmX.fillStyle='rgba(240,232,208,.75)';mmX.fillRect(0,0,mW,mH);
  const sx=mW/MAP_W, sy=mH/MAP_H;

  mmX.fillStyle='rgba(150,130,70,.25)';
  mmX.fillRect(0,0,mW,BASE_H*sy);
  mmX.fillRect(0,(MAP_H-BASE_H)*sy,mW,BASE_H*sy);

  ZONE_DEFS.forEach(z=>{
    if(z.ctrl!=='neutral'){
      mmX.fillStyle=z.ctrl==='red'?'rgba(139,26,26,.3)':'rgba(26,58,92,.3)';
      mmX.fillRect(0,z.bandY*sy,mW,BAND_H*sy);
    }
    mmX.strokeStyle='rgba(120,90,30,.25)';mmX.lineWidth=.5;
    mmX.beginPath();mmX.moveTo(0,z.bandY*sy);mmX.lineTo(mW,z.bandY*sy);mmX.stroke();
  });
  // Center
  mmX.strokeStyle='rgba(120,90,30,.55)';mmX.lineWidth=1;
  mmX.beginPath();mmX.moveTo(0,(BASE_H+BAND_H*3)*sy);mmX.lineTo(mW,(BASE_H+BAND_H*3)*sy);mmX.stroke();

  // Obstacles (walls only, tiny)
  obstacles.forEach(o=>{
    if(o.t==='wall_high'){
      mmX.fillStyle='rgba(92,74,30,.6)';
      mmX.fillRect(o.x*sx,o.y*sy,Math.max(1,o.w*sx),Math.max(1,o.h*sy));
    }
  });

  // Zone circles
  ZONE_DEFS.forEach(z=>{
    mmX.fillStyle=z.ctrl==='red'?'rgba(192,57,43,.8)':z.ctrl==='blue'?'rgba(41,128,185,.8)':'rgba(138,112,64,.5)';
    mmX.beginPath();mmX.arc(z.cx*sx,z.cy*sy,3,0,Math.PI*2);mmX.fill();
  });

  // Bots
  bots.forEach(b=>{
    if(!b.alive)return;
    mmX.fillStyle='rgba(41,128,185,.9)';
    mmX.beginPath();mmX.arc(b.x*sx,b.y*sy,2.5,0,Math.PI*2);mmX.fill();
  });

  // Player
  if(player.alive){
    mmX.fillStyle='#e74c3c';
    mmX.beginPath();mmX.arc(player.x*sx,player.y*sy,3.5,0,Math.PI*2);mmX.fill();
    // Direction tick
    mmX.strokeStyle='#e74c3c';mmX.lineWidth=1;
    mmX.beginPath();
    mmX.moveTo(player.x*sx,player.y*sy);
    mmX.lineTo((player.x+Math.cos(player.angle)*12)*sx,(player.y+Math.sin(player.angle)*12)*sy);
    mmX.stroke();
  }
}

// ── DEBUG PANEL ───────────────────────────────
function toggleDbg(){
  document.getElementById('dbgpanel').classList.toggle('open');
}

// Map slider id → VARS key
const sliderMap = {
  sl_moveSpeed:  ['moveSpeed',  1],
  sl_rotSpeed:   ['rotSpeed',   3],
  sl_crouchMult: ['crouchMult', 2],
  sl_proneMult:  ['proneMult',  2],
  sl_shootRange: ['shootRange', 0],
  sl_coneDeg:    ['coneDeg',    0],
  sl_fireRate:   ['fireRate',   0],
  sl_bulletDmg:  ['bulletDmg',  0],
  sl_bulletSpd:  ['bulletSpd',  1],
  sl_camZoom:    ['camZoom',    2],
  sl_camOffset:  ['camOffset',  0],
  sl_botSpeed:   ['botSpeed',   1],
  sl_botHP:      ['botHP',      0],
};

function initSliders(){
  Object.entries(sliderMap).forEach(([id,[key,dec]])=>{
    const sl=document.getElementById(id);
    const lbl=document.getElementById('lbl_'+id.replace('sl_',''));
    sl.value=VARS[key];
    lbl.textContent=VARS[key].toFixed(dec);
    sl.addEventListener('input',()=>{
      VARS[key]=parseFloat(sl.value);
      lbl.textContent=VARS[key].toFixed(dec);
      // Live apply botHP to alive bots
      if(key==='botHP') bots.forEach(b=>{if(b.alive){b.maxHp=VARS.botHP;}});
    });
  });
}

function resetDefaults(){
  const D={moveSpeed:2.8,rotSpeed:0.032,crouchMult:0.55,proneMult:0.28,
    shootRange:160,coneDeg:22,fireRate:180,bulletDmg:22,bulletSpd:10,
    camZoom:1.6,camOffset:60,botSpeed:1.4,botHP:100};
  Object.assign(VARS,D);
  Object.entries(sliderMap).forEach(([id,[key,dec]])=>{
    const sl=document.getElementById(id);
    const lbl=document.getElementById('lbl_'+id.replace('sl_',''));
    sl.value=VARS[key];
    lbl.textContent=VARS[key].toFixed(dec);
  });
  spawnBots();
}

// ── BOOT ──────────────────────────────────────
initSliders();
recalcPush();
requestAnimationFrame(update);
</script>
